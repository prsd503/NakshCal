<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vedic Calendar 2026</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#ff7e5f">
    <style>
        :root {
            --bg-gradient: linear-gradient(135deg, #1a1c29 0%, #10111a 100%);
            --card-bg: rgba(255, 255, 255, 0.06);
            --card-border: rgba(255, 255, 255, 0.1);
            --primary-accent: #ff7e5f;
            --secondary-accent: #feb47b;
            --text-main: #f3f4f6;
            --text-muted: #9ca3af;
            --sunday-color: #ef4444;
            --holiday-bg: linear-gradient(135deg, #fee2e2 0%, #fecaca 100%);
            --holiday-text: #991b1b;
            --astro-color: #6ee7b7;
            --nakshatra-color: #fcd34d;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background: var(--bg-gradient);
            color: var(--text-main);
            min-height: 100vh;
            padding: 10px;
            display: flex;
            justify-content: center;
            align-items: flex-start;
        }

        .calendar-container {
            width: 100%;
            max-width: 500px;
            background: var(--card-bg);
            backdrop-filter: blur(10px);
            border: 1px solid var(--card-border);
            border-radius: 24px;
            padding: 16px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
        }

        .calendar-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding: 0 4px;
        }

        .calendar-header h1 {
            font-size: 1.4rem;
            font-weight: 700;
            background: linear-gradient(to right, var(--primary-accent), var(--secondary-accent));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .nav-btn {
            background: rgba(255, 255, 255, 0.1);
            border: none;
            color: var(--text-main);
            padding: 8px 14px;
            border-radius: 12px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.2s ease;
        }

        .nav-btn:hover {
            background: rgba(255, 255, 255, 0.2);
        }

        .weekdays-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            text-align: center;
            font-weight: 600;
            font-size: 0.8rem;
            margin-bottom: 10px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .weekdays-grid div:first-child { color: var(--sunday-color); }
        .weekdays-grid div:not(:first-child) { color: var(--text-muted); }

        .days-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 8px;
        }

        .day-cell {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 14px;
            min-height: 85px;
            padding: 6px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            position: relative;
            transition: transform 0.2s, background-color 0.2s;
            cursor: pointer;
            -webkit-tap-highlight-color: transparent;
        }

        .day-cell:hover { background: rgba(255, 255, 255, 0.08); }
        .day-cell.selected { border: 2px solid var(--secondary-accent); background: rgba(255, 255, 255, 0.12); }
        .day-cell.empty { background: transparent; border: none; pointer-events: none; }
        .day-num { font-size: 1.1rem; font-weight: 700; }
        .day-cell.is-sunday .day-num { color: var(--sunday-color); }

        .day-cell.is-holiday { background: var(--holiday-bg) !important; border-color: #fca5a5; }
        .day-cell.is-holiday .day-num { color: var(--holiday-text) !important; }

        .note-indicator {
            position: absolute;
            top: 6px;
            right: 6px;
            width: 6px;
            height: 6px;
            background-color: #3b82f6;
            border-radius: 50%;
            display: none;
        }

        .day-cell.has-note .note-indicator { display: block; }

        .astro-info {
            display: flex;
            flex-direction: column;
            gap: 1px;
            font-size: 0.58rem;
            line-height: 1.2;
            margin-top: 4px;
            font-weight: 500;
        }

        .sun-sign { color: var(--secondary-accent); }
        .moon-sign { color: var(--astro-color); }
        .nakshatra { color: var(--nakshatra-color); }

        .day-cell.is-holiday .sun-sign,
        .day-cell.is-holiday .moon-sign,
        .day-cell.is-holiday .nakshatra {
            color: #7f1d1d;
            font-weight: 600;
        }

        .details-panel {
            margin-top: 16px;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid var(--card-border);
            border-radius: 16px;
            padding: 14px;
            font-size: 0.85rem;
            display: none;
            animation: fadeIn 0.25s ease;
        }

        .details-panel.active { display: block; }

        .panel-date {
            font-weight: 700;
            color: var(--secondary-accent);
            margin-bottom: 10px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            padding-bottom: 4px;
        }

        .info-row {
            display: flex;
            align-items: flex-start;
            margin-bottom: 8px;
            gap: 10px;
            line-height: 1.4;
        }

        .info-badge {
            min-width: 90px;
            text-align: center;
            padding: 3px 6px;
            border-radius: 6px;
            font-size: 0.72rem;
            font-weight: bold;
        }

        .badge-nakshatra { background: #78350f; color: #fde68a; }
        .badge-note { background: #1e3a8a; color: #bfdbfe; }

        .holiday-block {
            background: rgba(239, 68, 68, 0.2);
            border-left: 3px solid #ef4444;
            padding: 6px 10px;
            margin-bottom: 10px;
            border-radius: 0 8px 8px 0;
            color: #fecaca;
        }

        .time-entry { margin-top: 4px; font-size: 0.8rem; }
        .time-label { color: var(--text-muted); display: inline-block; width: 50px; }

        .note-input-container { margin-top: 8px; display: flex; gap: 6px; width: 100%; }
        .note-input {
            flex: 1; background: rgba(255, 255, 255, 0.08); border: 1px solid var(--card-border);
            border-radius: 8px; padding: 6px 10px; color: var(--text-main); font-size: 0.8rem; outline: none;
        }
        .note-input:focus { border-color: var(--secondary-accent); }
        .note-btn {
            background: var(--primary-accent); border: none; color: white;
            padding: 6px 12px; border-radius: 8px; font-size: 0.8rem; font-weight: 600; cursor: pointer;
        }

        .perm-btn {
            background: #059669; color: white; width: 100%; border: none; padding: 8px;
            border-radius: 10px; font-size: 0.8rem; font-weight: 600; margin-bottom: 12px; cursor: pointer;
        }

        /* --- Custom Modal Styling --- */
        .modal-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(10, 11, 26, 0.75);
            backdrop-filter: blur(8px);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
        }
        .modal-overlay.active {
            opacity: 1;
            pointer-events: auto;
        }
        .modal-box {
            background: rgba(30, 32, 47, 0.95);
            border: 1px solid var(--card-border);
            border-radius: 20px;
            padding: 24px;
            max-width: 380px;
            width: 90%;
            text-align: center;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.6);
            transform: scale(0.9);
            transition: transform 0.3s ease;
        }
        .modal-overlay.active .modal-box {
            transform: scale(1);
        }
        .modal-icon {
            font-size: 2.5rem;
            margin-bottom: 12px;
        }
        .modal-title {
            font-size: 1.2rem;
            font-weight: 700;
            color: var(--secondary-accent);
            margin-bottom: 8px;
        }
        .modal-message {
            font-size: 0.9rem;
            color: var(--text-main);
            line-height: 1.5;
            margin-bottom: 20px;
        }
        .modal-close-btn {
            background: linear-gradient(135deg, var(--primary-accent), var(--secondary-accent));
            border: none;
            color: white;
            font-weight: 600;
            padding: 10px 24px;
            border-radius: 12px;
            cursor: pointer;
            width: 100%;
            transition: opacity 0.2s;
        }
        .modal-close-btn:hover {
            opacity: 0.9;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(4px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <div class="calendar-container">
        <button class="perm-btn" id="enable-notifications-btn">🔔 Enable 10:00 AM Mobile Notifications</button>
        
        <div class="calendar-header">
            <button class="nav-btn" id="prev-btn">←</button>
            <h1 id="month-year-title">May 2026</h1>
            <button class="nav-btn" id="next-btn">→</button>
        </div>

        <div class="weekdays-grid">
            <div>Sun</div><div>Mon</div><div>Tue</div><div>Wed</div><div>Thu</div><div>Fri</div><div>Sat</div>
        </div>

        <div class="days-grid" id="days-container"></div>
        <div class="details-panel" id="info-panel"></div>
    </div>

    <div class="modal-overlay" id="custom-modal">
        <div class="modal-box">
            <div class="modal-icon">⚠️</div>
            <div class="modal-title" id="modal-title">Notice</div>
            <div class="modal-message" id="modal-message">Notification feature updates.</div>
            <button class="modal-close-btn" id="modal-close-btn">Dismiss</button>
        </div>
    </div>

    <script>
        const indianHolidays2026 = {
            "2026-01-26": "Republic Day", "2026-03-04": "Holi", "2026-03-21": "Id-ul-Fitr (Ramzan ID)",
            "2026-03-26": "Ram Navami", "2026-03-31": "Mahavir Jayanti", "2026-04-03": "Good Friday",
            "2026-05-01": "Buddha Purnima", "2026-05-27": "Id-ul-Zuha (Bakrid)", "2026-06-26": "Muharram",
            "2026-08-15": "Independence Day", "2026-08-26": "Id-e-Milad (Prophet Birthday)", "2026-09-04": "Janmashtami",
            "2026-10-02": "Mahatma Gandhi Jayanti", "2026-10-20": "Dussehra (Vijayadashami)", "2026-11-08": "Diwali (Deepavali)",
            "2026-11-24": "Guru Nanak Jayanti", "2026-12-25": "Christmas Day"
        };

        const sunSigns = ["Cap", "Aqu", "Pis", "Ari", "Tau", "Gem", "Can", "Leo", "Vir", "Lib", "Sco", "Sag"];
        const moonSigns = ["Ari", "Tau", "Gem", "Can", "Leo", "Vir", "Lib", "Sco", "Sag", "Cap", "Aqu", "Pis"];
        const nakshatras = [
            "Ashwini", "Bharani", "Krittika", "Rohini", "Mrigashira", "Ardra", "Punarvasu", "Pushya", "Ashlesha",
            "Magha", "Purva Phalguni", "Uttara Phalguni", "Hasta", "Chitra", "Swati", "Vishakha", "Anuradha", "Jyeshtha",
            "Mula", "Purva Ashadha", "Uttara Ashadha", "Shravana", "Dhanishta", "Shatabhisha", "Purva Bhadrapada", "Uttara Bhadrapada", "Revati"
        ];

        const monthNames = ["January", "February", "March", "April", "May", "June", "July", "August", "September", "October", "November", "December"];
        
        let currentMonth = 4; // May 2026
        const year = 2026;
        let selectedDateString = "";
        let savedNotes = {};
        let activeServiceWorkerRegistration = null;

        try {
            const rawNotes = localStorage.getItem("vedic_calendar_notes");
            if (rawNotes) savedNotes = JSON.parse(rawNotes);
        } catch (e) {
            savedNotes = {};
        }

        const titleEl = document.getElementById("month-year-title");
        const containerEl = document.getElementById("days-container");
        const panelEl = document.getElementById("info-panel");
        const permBtn = document.getElementById("enable-notifications-btn");

        // Modal Elements
        const modalOverlay = document.getElementById("custom-modal");
        const modalTitle = document.getElementById("modal-title");
        const modalMessage = document.getElementById("modal-message");
        const modalCloseBtn = document.getElementById("modal-close-btn");

        // Helper function to trigger custom modal instead of system alert
        function showAlertModal(title, message) {
            modalTitle.textContent = title;
            modalMessage.textContent = message;
            modalOverlay.classList.add("active");
        }

        modalCloseBtn.addEventListener("click", () => {
            modalOverlay.classList.remove("active");
        });

        // Close modal when clicking outside the box
        modalOverlay.addEventListener("click", (e) => {
            if (e.target === modalOverlay) {
                modalOverlay.classList.remove("active");
            }
        });

        // Service Worker registration block
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('sw.js')
                .then(reg => {
                    activeServiceWorkerRegistration = reg;
                    if (window.Notification && Notification.permission === "granted") {
                        permBtn.style.display = "none";
                    }
                });
            });
        }

        permBtn.addEventListener("click", () => {
            if (!window.Notification) {
                showAlertModal("Not Supported", "Push notifications are not supported on this browser or mobile device setup.");
                return;
            }
            Notification.requestPermission().then(permission => {
                if (permission === "granted") {
                    permBtn.style.display = "none";
                }
            });
        });

        function formatClockTime(minutes) {
            minutes = (minutes + 1440) % 1440;
            let hours = Math.floor(minutes / 60);
            let mins = Math.floor(minutes % 60);
            let ampm = hours >= 12 ? 'PM' : 'AM';
            hours = hours % 12;
            hours = hours ? hours : 12;
            return `${hours}:${String(mins).padStart(2, '0')} ${ampm}`;
        }

        function getAstrologicalData(year, month, day) {
            const dateObj = new Date(year, month, day);
            const baseDate = new Date(2026, 0, 1);
            const diffDays = Math.floor((dateObj - baseDate) / (1000 * 60 * 60 * 24));

            const sunTransitDays = [14, 13, 14, 14, 15, 15, 16, 17, 17, 17, 16, 16];
            let sunIdx = month; 
            if (day < sunTransitDays[month]) { sunIdx = (month + 11) % 12; }

            const totalDegreesStart = 45 + (diffDays * 13.17633);
            let moonIdx = Math.floor((totalDegreesStart % 360) / 30);
            if (moonIdx < 0) moonIdx += 12;

            let nakshatraIdx = Math.floor((totalDegreesStart % 360) / 13.33333);
            if (nakshatraIdx < 0) nakshatraIdx += 27;

            const degreesIntoCurrentNakshatra = (totalDegreesStart % 360) % 13.33333;
            const degreesRemainingNakshatra = 13.33333 - degreesIntoCurrentNakshatra;

            const minutesElapsed = (degreesIntoCurrentNakshatra / 13.17633) * 1440;
            const minutesRemaining = (degreesRemainingNakshatra / 13.17633) * 1440;

            const baseTimeMinutes = 360; 
            const startTotalMinutes = baseTimeMinutes - minutesElapsed;

            const startDateObj = new Date(year, month, day);
            startDateObj.setMinutes(startDateObj.getMinutes() - minutesElapsed + baseTimeMinutes);
            
            const endDateObj = new Date(year, month, day);
            endDateObj.setMinutes(endDateObj.getMinutes() + minutesRemaining + baseTimeMinutes);

            return {
                sun: sunSigns[sunIdx],
                moon: moonSigns[moonIdx],
                nakshatra: nakshatras[nakshatraIdx],
                startDateText: startDateObj.toLocaleDateString('en-US', { day: 'numeric', month: 'short' }),
                endDateText: endDateObj.toLocaleDateString('en-US', { day: 'numeric', month: 'short' }),
                startTimeText: formatClockTime(startTotalMinutes),
                endTimeText: formatClockTime(baseTimeMinutes + minutesRemaining)
            };
        }

        function handleSaveRoutine() {
            const inputField = document.getElementById("note-field");
            if (inputField && selectedDateString) {
                const textVal = inputField.value.trim();
                if (textVal === "") {
                    delete savedNotes[selectedDateString];
                } else {
                    savedNotes[selectedDateString] = textVal;
                }
                localStorage.setItem("vedic_calendar_notes", JSON.stringify(savedNotes));
                renderCalendar(currentMonth);
                
                const activeCell = document.querySelector(`.day-cell[data-date="${selectedDateString}"]`);
                if (activeCell) activeCell.click();
            }
        }

        function renderCalendar(month) {
            containerEl.innerHTML = "";
            titleEl.textContent = `${monthNames[month]} ${year}`;
            panelEl.classList.remove("active");

            const firstDayIndex = new Date(year, month, 1).getDay();
            const totalDays = new Date(year, month + 1, 0).getDate();

            for (let i = 0; i < firstDayIndex; i++) {
                const emptyCell = document.createElement("div");
                emptyCell.classList.add("day-cell", "empty");
                containerEl.appendChild(emptyCell);
            }

            for (let day = 1; day <= totalDays; day++) {
                const cell = document.createElement("div");
                cell.classList.add("day-cell");

                const currentWeekday = (firstDayIndex + day - 1) % 7;
                const dateString = `${year}-${String(month + 1).padStart(2, '0')}-${String(day).padStart(2, '0')}`;
                cell.setAttribute("data-date", dateString);

                if (currentWeekday === 0) cell.classList.add("is-sunday");
                if (indianHolidays2026[dateString]) cell.classList.add("is-holiday");
                if (savedNotes[dateString]) cell.classList.add("has-note");

                const dot = document.createElement("div");
                dot.classList.add("note-indicator");
                cell.appendChild(dot);

                const dayNumEl = document.createElement("div");
                dayNumEl.classList.add("day-num");
                dayNumEl.textContent = day;
                cell.appendChild(dayNumEl);

                const astro = getAstrologicalData(year, month, day);

                const astroContainer = document.createElement("div");
                astroContainer.classList.add("astro-info");
                astroContainer.innerHTML = `
                    <span class="sun-sign">⊙ ${astro.sun}</span>
